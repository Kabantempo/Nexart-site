name: Deploy to Hostinger (Manual)

on:
  workflow_dispatch  # Only manual trigger, NOT on push

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Hostinger
        env:
          DEPLOY_KEY: ${{ secrets.HOSTINGER_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/hostinger_nexart
          chmod 600 ~/.ssh/hostinger_nexart
          ssh-keyscan -p 65002 147.79.103.73 >> ~/.ssh/known_hosts 2>/dev/null || true

          # Build and deploy
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            -e "ssh -p 65002 -i ~/.ssh/hostinger_nexart" \
            .next/standalone/ \
            u142938038@147.79.103.73:~/domains/nexart.fr/nodejs/

          ssh -p 65002 -i ~/.ssh/hostinger_nexart u142938038@147.79.103.73 \
            "touch ~/domains/nexart.fr/nodejs/tmp/restart.txt"

      - name: ✅ Deploy success
        run: echo "Deployed to https://nexart.fr"
